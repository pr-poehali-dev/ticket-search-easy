<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Подбор страховки</title>
<base target="_blank">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #111;
  }
  *, *::before, *::after { box-sizing: border-box; }
  #loader {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #8a8a8a;
    font-size: 14px;
  }
  #loader .dot {
    width: 8px;
    height: 8px;
    background: #7B9D52;
    border-radius: 50%;
    margin-right: 10px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="loader"><span class="dot"></span>Загружаем форму подбора страховки…</div>
<script async src="https://tpemd.com/content?trs=527526&shmarker=727110&destinations=shengen&color1=%237B9D52ff&color2=%237B9D52ff&powered_by=false&campaign_id=49&promo_id=4319" charset="utf-8"></script>
<script>
  setTimeout(function() {
    var loader = document.getElementById('loader');
    if (loader) loader.style.display = 'none';
  }, 2500);
</script>
</body>
</html>
